<script>
/* ====================================================================
   PY//LEARN — Topics 5 & 6 interactive courseware (vanilla JS)
   §0 Signature   — integrity-protected developer credit
   §1 Runtime     — Pyodide boot + runSnippet(): stdout/err capture
   §2 LEARN       — lesson data, nav, runnable example cards
   §3 PRACTICE    — challenges, CodeMirror, output/code checking
   §4 QUIZ        — MCQ data, grading, explanations
   ==================================================================== */

/* ============ §0 APPLICATION SIGNATURE (integrity-protected) ======== */
const _SIG_F = ["RGV2ZWxvcGVkIGJ5IA==", "UmFqZXNoIFIgTW9oYW4=", "IGZvciBJVEUgQ1c="];
const _SIG_H = 3332075197;
function _sigText(){ try{ return _SIG_F.map(f => atob(f)).join(""); }catch(e){ return ""; } }
function _sigHash(s){ let h = 5381; for (let i = 0; i < s.length; i++) h = ((h * 33) + s.charCodeAt(i)) >>> 0; return h; }
function verifySignature(){ return _sigHash(_sigText()) === _SIG_H; }
function lockApp(){
  document.body.innerHTML =
    '<div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;color:#fb4d5c;background:#0b0f19;text-align:center;padding:20px;">' +
    '⛔ INTEGRITY CHECK FAILED<br><br>The application signature has been modified.<br>Restore the original file to continue.</div>';
  throw new Error("signature integrity failure");
}

const $ = id => document.getElementById(id);

/* ============ §1 PYTHON RUNTIME ===================================== */
let pyodide = null;

function setStatus(mode, text){
  const el = $("status");
  el.classList.remove("ready", "running");
  if (mode) el.classList.add(mode);
  $("status-text").textContent = text;
}

async function bootPyodide(){
  try{
    pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/" });
    pyodide.runPython(`
import builtins, js
def _browser_input(prompt_text=""):
    result = js.window.prompt(str(prompt_text))
    if result is None:
        raise EOFError("input() was cancelled by the user")
    print(str(prompt_text) + result)
    return result
builtins.input = _browser_input
`);
    setStatus("ready", "Python 3.11 ready");
  }catch(err){
    setStatus("", "Runtime failed to load — check internet & reload");
  }
}

async function runSnippet(code){
  if (!pyodide) return { out:"", err:"Python runtime is still loading — try again in a moment." };
  let out = "", err = "";
  pyodide.setStdout({ batched: t => { out += t + "\n"; } });
  pyodide.setStderr({ batched: t => { err += t + "\n"; } });
  setStatus("running", "Executing…");
  try{
    await pyodide.runPythonAsync(code);
  }catch(e){
    err += (e.message || String(e));
  }finally{
    setStatus("ready", "Python 3.11 ready");
  }
  return { out, err };
}

/* ============ §2 LEARN MODE ========================================= */
const LESSONS = [
  { topic:"Topic 5 · Literals", id:"t5-1", title:"5.1 What is a literal?",
    html: `
<h2>Literals</h2>
<div class="objective">Objective 1 · explain various types of literals</div>
<p>A <b>literal</b> is data whose value is determined by the literal itself. Let's start with a simple experiment — run the example below. You should see two identical lines. What happened?</p>
<p>You have met two <b>different types</b> of literals:</p>
<ul>
  <li>a <b>string</b> — <code>"2"</code>, which you already know;</li>
  <li>an <b>integer number</b> — <code>2</code>, something completely new.</li>
</ul>
<p>Internally, in the computer's memory, these two values are stored in completely different ways. The string exists as just a series of characters and <b>cannot be used for arithmetic</b>.</p>

let activeLesson = 0;

function esc(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function renderLessonNav(){
  const list = $("lesson-nav-list");
  list.innerHTML = "";
  let lastTopic = "";
  LESSONS.forEach((L, i) => {
    if (L.topic !== lastTopic){
      lastTopic = L.topic;
      const t = document.createElement("div");

      list.appendChild(t);
    }
    const item = document.createElement("div");

  const L = LESSONS[activeLesson];
  $("lesson-tag").textContent = L.topic;

  L.examples.forEach((ex, n) => {

    head.className = "ex-head";

      (ex.predict ? `<span class="predict">🔮 predict the output first!</span>` : "");

let activeTask = 0;
const taskState = TASKS.map(t => ({ code:t.starter, done:false }));

const taskEditor = CodeMirror.fromTextArea($("task-code"), {
  mode:"python", lineNumbers:true, indentUnit:4, smartIndent:true,
  matchBrackets:true, viewportMargin:Infinity
});

function renderTaskNav(){
  const list = $("task-nav-list");
  list.innerHTML = "";
  TASKS.forEach((t, i) => {
    const item = document.createElement("div");
    item.className = "nav-item task-item" + (i === activeTask ? " active" : "") + (taskState[i].done ? " done" : "");
    item.innerHTML = `<span class="tick">✔</span><span>${t.title}</span>`;
    item.addEventListener("click", () => selectTask(i));
    list.appendChild(item);
  });
}

function selectTask(i){
  taskState[activeTask].code = taskEditor.getValue();
  activeTask = i;
  const t = TASKS[i];
  $("task-brief").innerHTML = t.brief +
    (t.expected !== null
      ? `<div style="font-size:.68rem;letter-spacing:.14em;color:var(--text-dim);margin:6px 0 4px;">EXPECTED OUTPUT</div><div class="expected">${esc(t.expected)}</div>`
      : "");
  taskEditor.setValue(taskState[i].code);
  $("task-result").innerHTML = `<span class="placeholder">Run your code, then press “Check My Code” to test it against the expected output.</span>`;
  renderTaskNav();
  taskEditor.focus();
}

function normalise(text){
  const lines = text.replace(/\r/g, "").split("\n").map(l => l.replace(/\s+$/,""));
  while (lines.length && lines[lines.length-1] === "") lines.pop();
  return lines.join("\n");
}

async function runTask(check){
  if (!verifySignature()) return lockApp();
  taskState[activeTask].code = taskEditor.getValue();
  const t = TASKS[activeTask];
  const res = $("task-result");
  const r = await runSnippet(taskEditor.getValue());

  /* plain run, or the free sandbox */
  if (!check || (t.expected === null && !t.checkCode)){
    res.innerHTML =
      (r.out ? esc(r.out) : "") +
      (r.err ? `<div class="err-text">${esc(r.err)}</div>` : "") +
      (!r.out && !r.err ? `<span class="placeholder">(no output)</span>` : "");
    return;
  }

  /* CHECK MODE */
  let html = "";
  if (r.err){
    html += `<div class="verdict fail">✘ NOT YET — your program has an error</div>\n<div class="err-text">${esc(r.err)}</div>`;
    res.innerHTML = html; return;
  }

  const src = taskEditor.getValue();
  const misses = (t.mustContain || []).filter(rule => !rule.re.test(src)).map(rule => rule.msg);

  /* code-only check (used for input()-based programs) */
  if (t.checkCode){
    if (misses.length === 0){
      taskState[activeTask].done = true;
      renderTaskNav();
      html += `<div class="verdict pass">✔ PASSED — program runs and uses input() correctly!</div>\n${esc(r.out)}`;
    } else {
      html += `<div class="verdict fail">✘ NOT YET — keep trying</div><div class="hint-text">Hint: ${misses.map(esc).join(" ")}</div>\n${esc(r.out)}`;
    }
    res.innerHTML = html; return;
  }

  const got = normalise(r.out);
  const want = normalise(t.expected);
  const outputOK = got === want;

  if (outputOK && misses.length === 0){
    taskState[activeTask].done = true;
    renderTaskNav();
    html += `<div class="verdict pass">✔ PASSED — well done!</div>\n${esc(got)}`;
  } else {
    html += `<div class="verdict fail">✘ NOT YET — keep trying</div>`;
    if (misses.length) html += `<div class="hint-text">Hint: ${misses.map(esc).join(" ")}</div>`;
    if (!outputOK){
      html += `<div class="diff-grid">
        <div class="diff-box"><span class="lbl">EXPECTED</span>${esc(want)}</div>
        <div class="diff-box bad"><span class="lbl">YOUR OUTPUT</span>${got ? esc(got) : "<i>(no output)</i>"}</div>
      </div>`;
    } else {
      html += `\n${esc(got)}`;
    }
  }
  res.innerHTML = html;
}

$("btn-task-run").addEventListener("click", () => runTask(false));
$("btn-task-check").addEventListener("click", () => runTask(true));
$("btn-task-reset").addEventListener("click", () => {

  taskEditor.setValue(TASKS[activeTask].starter);
  taskState[activeTask].code = TASKS[activeTask].starter;
});

    opts:[`2`, `2.33`, `1`, `0`],
    a:2, ex:`% (modulus) keeps only the remainder: 7 ÷ 3 = 2 remainder 1.` },
  { q:`In Python, <code>3e8</code> means…`,
    opts:[`3 × 8 = 24`, `3 × 10⁸ (300000000.0)`, `The string "3e8"`, `An error`],
    a:1, ex:`The letter e is scientific notation — 3e8 is 3 times ten to the power 8, stored as a float.` },
  { q:`How does Python see <code>4</code> and <code>4.0</code>?`,
    opts:[`Exactly the same number`, `4 is an integer, 4.0 is a float`, `Both are floats`, `4.0 is a string`],
    a:1, ex:`The decimal point is essential: it makes 4.0 a floating-point number, while 4 stays an integer.` },
  { q:`What is the decimal value of <code>0b1011</code>? <i>(handout Q3a)</i>`,
    opts:[`1011`, `11`, `13`, `9`],
    a:1, ex:`Binary 1011 = 8 + 0 + 2 + 1 = 11.` },
  { q:`What is the decimal value of <code>0x20</code>? <i>(handout Q3b)</i>`,
    opts:[`20`, `16`, `32`, `8`],
    a:2, ex:`Hexadecimal 20 = 2 × 16 + 0 = 32.` },
  { q:`What does <code>hex(12)</code> return? <i>(handout Q3e)</i>`,
    opts:[`0xc`, `0x12`, `12`, `0b1100`],
    a:0, ex:`hex() gives the hexadecimal representation: decimal 12 is c in base 16, written 0xc.` },
  { q:`Which of these is a <b>valid</b> Python variable name?`,
    opts:[`2names`, `my-age`, `for`, `my_age`],
    a:3, ex:`Names must start with a letter, use only letters/digits/underscore, and must not be a keyword like for.` },
  { q:`Are <code>Alice</code> and <code>ALICE</code> the same variable?`,
    opts:[`Yes — Python ignores case`, `No — upper and lower case are different`, `Only if both are strings`, `Only inside print()`],
    a:1, ex:`Python is case-sensitive: Alice and ALICE are two different variable names, so two different variables.` },
  { q:`What type of variable does <code>my_telephone = "91237783"</code> create?`,
    opts:[`Integer`, `Float`, `String`, `Boolean`],
    a:2, ex:`The quotes make it a string — even though it contains only digits.` },
  { q:`Given <code>a = "3"</code> and <code>b = "4"</code>, what is the output of <code>print(a + b)</code>? <i>(handout Q4)</i>`,
    opts:[`7`, `34`, `3 + 4`, `An error`],
    a:1, ex:`Both are strings, so + joins (concatenates) them: "3" + "4" gives the text 34 — not the sum 7!` },
  { q:`What type of value does <code>input()</code> always return?`,
    opts:[`Integer`, `Whatever type the user typed`, `String`, `Float`],
    a:2, ex:`input() always returns a string — to treat it as a number you must convert it, e.g. int(input(...)).` }
];

function renderQuiz(){
  const list = $("quiz-list");
  list.innerHTML = "";
  QUIZ.forEach((item, qi) => {
    const box = document.createElement("div");
    box.className = "quiz-q";
    box.dataset.q = qi;
    let inner = `<div class="q-text"><span class="q-num">Q${qi + 1}.</span>${item.q}</div>`;
    item.opts.forEach((opt, oi) => {
      inner += `<label><input type="radio" name="q${qi}" value="${oi}"><code>${esc(opt)}</code></label>`;
    });
    inner += `<div class="explain">💡 ${item.ex}</div>`;
    box.innerHTML = inner;
    list.appendChild(box);
  });
  $("quiz-score").style.display = "none";
  $("btn-quiz-submit").disabled = false;
}

function gradeQuiz(){
  if (!verifySignature()) return lockApp();
  let score = 0, answered = 0;
  document.querySelectorAll(".quiz-q").forEach(box => {
    const qi = +box.dataset.q;
    const chosen = box.querySelector("input:checked");
    if (chosen) answered++;
    box.classList.add("graded");
    box.querySelectorAll("label").forEach((lab, oi) => {
      const input = lab.querySelector("input");
      input.disabled = true;
      if (oi === QUIZ[qi].a) lab.classList.add("correct");
      else if (chosen && +chosen.value === oi) lab.classList.add("wrong");
    });
    if (chosen && +chosen.value === QUIZ[qi].a) score++;
  });
  if (answered < QUIZ.length &&
      !confirm(`You have answered ${answered} of ${QUIZ.length} questions. Unanswered questions count as wrong — submit anyway?\n\n(Press Cancel, then Try Again to keep answering.)`)){
    renderQuiz(); return;
  }
  const pct = Math.round(score / QUIZ.length * 100);
  const scoreEl = $("quiz-score");
  scoreEl.className = pct >= 80 ? "great" : pct >= 50 ? "ok" : "poor";
  scoreEl.id = "quiz-score";
  scoreEl.style.display = "block";
  scoreEl.textContent =
    `SCORE: ${score} / ${QUIZ.length} (${pct}%) — ` +
    (pct >= 80 ? "Excellent! You have mastered literals and variables. 🏆"
     : pct >= 50 ? "Good effort — review the explanations below, then try again."
     : "Keep practising — revisit the Learn tab, then try again.");
  $("btn-quiz-submit").disabled = true;
  scoreEl.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

$("btn-quiz-submit").addEventListener("click", gradeQuiz);
$("btn-quiz-retry").addEventListener("click", renderQuiz);

/* ============ MODE SWITCHING ======================================== */
function switchMode(mode){
  document.querySelectorAll(".mode-tab").forEach(t =>
    t.classList.toggle("active", t.dataset.mode === mode));
  document.querySelectorAll(".stage").forEach(s => s.classList.remove("active"));
  $("stage-" + mode).classList.add("active");
  if (mode === "practice") taskEditor.refresh();
}
document.querySelectorAll(".mode-tab").forEach(tab =>
  tab.addEventListener("click", () => switchMode(tab.dataset.mode)));
